name: Sync Upstream
on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: yonggekkk/x-ui-yg
          upstream_sync_branch: main
          target_sync_branch: main
          # 开启强推功能，保证永远和原作者百分百同步
          git_push_force: true
